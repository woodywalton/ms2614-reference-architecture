# M-26-14 Appendix C — Asset Inventory Osquery Pack
# Deploy via: Fleet > Agent Policies > Add Integration > Osquery Manager
# Pack name: m2614_asset_inventory
#
# All queries use snapshot mode (full current state, not differential).
# Schedule: daily (86400s) for all queries except heartbeat (900s).
#
# Result routing:
#   logs-osquery_manager.result-default → ingest pipeline m2614-osquery-normalize
#   → routed to:
#     logs-m2614_osquery.hardware_inventory-default   (hw_system_info)
#     logs-m2614_osquery.software_inventory-default   (sw_* queries)
#     logs-m2614_osquery.network_inventory-default    (net_interfaces)

name: m2614_asset_inventory
description: M-26-14 HWAM/SWAM compliance asset inventory pack — hardware, software, network

queries:

  # ---------------------------------------------------------------------------
  # Hardware Inventory (daily) — HWAM Element 1
  # ---------------------------------------------------------------------------
  m2614_hw_system_info:
    query: >
      SELECT
        computer_name,
        hardware_model,
        hardware_vendor,
        hardware_serial,
        cpu_brand,
        cpu_physical_cores,
        cpu_logical_cores,
        physical_memory,
        board_vendor,
        board_model,
        board_serial
      FROM system_info;
    interval: 86400
    platform: all
    snapshot: true
    description: "Hardware inventory for M-26-14 HWAM — system info, CPU, memory, serial"
    version: 1

  m2614_hw_battery:
    query: >
      SELECT serial_number, manufacturer, design_capacity, current_capacity, health
      FROM battery;
    interval: 86400
    platform: darwin,linux,windows
    snapshot: true
    description: "Battery inventory for mobile/laptop asset tracking"
    version: 1

  # ---------------------------------------------------------------------------
  # OS & Software Inventory (daily) — SWAM Element 2
  # ---------------------------------------------------------------------------
  m2614_sw_os:
    query: >
      SELECT name, version, build, platform, platform_like, codename, arch, install_date
      FROM os_version;
    interval: 86400
    platform: all
    snapshot: true
    description: "OS version inventory for patch and lifecycle compliance"
    version: 1

  m2614_sw_packages_linux:
    query: >
      SELECT name, version, arch, type, source, install_time
      FROM rpm_packages
      UNION ALL
      SELECT name, version, arch, 'deb' AS type, source, install_time
      FROM deb_packages;
    interval: 86400
    platform: linux
    snapshot: true
    description: "Linux package inventory (rpm + deb) for SWAM"
    version: 1

  m2614_sw_programs_windows:
    query: >
      SELECT name, version, publisher, install_date, install_location
      FROM programs;
    interval: 86400
    platform: windows
    snapshot: true
    description: "Windows installed programs inventory for SWAM"
    version: 1

  m2614_sw_apps_macos:
    query: >
      SELECT name, bundle_identifier, bundle_version, category, path, signed
      FROM apps;
    interval: 86400
    platform: darwin
    snapshot: true
    description: "macOS application inventory for SWAM"
    version: 1

  m2614_sw_patches_windows:
    query: >
      SELECT hotfix_id, description, installed_on
      FROM patches;
    interval: 86400
    platform: windows
    snapshot: true
    description: "Windows hotfix/patch inventory for patch compliance"
    version: 1

  # ---------------------------------------------------------------------------
  # Network Inventory (daily)
  # ---------------------------------------------------------------------------
  m2614_net_interfaces:
    query: >
      SELECT
        ia.interface,
        ia.address,
        ia.mask,
        ia.broadcast,
        id.mac,
        id.type,
        id.mtu,
        id.description
      FROM interface_addresses ia
      JOIN interface_details id ON ia.interface = id.interface
      WHERE ia.address NOT LIKE '127.%'
        AND ia.address NOT LIKE '::1';
    interval: 86400
    platform: all
    snapshot: true
    description: "Network interface inventory — IP, MAC, type for asset identification"
    version: 1

  m2614_net_arp_neighbors:
    query: >
      SELECT address, mac, interface
      FROM arp_cache
      WHERE address NOT IN (SELECT address FROM interface_addresses);
    interval: 86400
    platform: all
    snapshot: true
    description: "ARP neighbor discovery — detect nearby unmanaged assets"
    version: 1

  # ---------------------------------------------------------------------------
  # User Inventory (daily)
  # ---------------------------------------------------------------------------
  m2614_users_local:
    query: >
      SELECT uid, gid, username, description, directory, shell, type
      FROM users
      WHERE type != 'special';
    interval: 86400
    platform: all
    snapshot: true
    description: "Local user account inventory for privileged access visibility"
    version: 1

  # ---------------------------------------------------------------------------
  # Agent Heartbeat (every 15 minutes) — drift detection
  # ---------------------------------------------------------------------------
  m2614_agent_heartbeat:
    query: >
      SELECT uuid, pid, start_time,
        (SELECT boot_time FROM system_info) AS boot_time
      FROM osquery_info;
    interval: 900
    platform: all
    snapshot: false
    description: "Agent liveness heartbeat — enables drift detection Watcher"
    version: 1
