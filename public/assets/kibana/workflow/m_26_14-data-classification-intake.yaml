# =============================================================================
# Elastic Workflow: M-26-14 Data Classification Intake
# Category: compliance/data-management
#
# Manual workflow triggered when a new index or data stream is discovered
# without an assigned data classification label. Opens a Kibana Case for
# data steward review, records classification_pending in the audit index,
# and notifies the responsible team.
#
# Run before any retention policy or access controls are applied to a new
# data stream — satisfies M-26-14 Data pillar categorization requirement.
#
# NOTE: Update consts before running. The workflow does not modify the
# index itself — the steward applies the classification label via the
# m_26_14-data-classification-requests audit index after Case review.
#
# Schema: github.com/elastic/workflows
# Author: Elastic / M-26-14 Compliance Pack
# Tags: M-26-14, Compliance, Data Classification, Data Pillar, Manual
# =============================================================================
version: "1"
name: M-26-14 Data Classification Intake
description: >
  Manual workflow for initiating data classification review of a newly
  discovered index or data stream. Opens a Kibana Case assigned to the
  data steward with classification guidance, records classification_pending
  state in the audit index, and sends a notification. Satisfies M-26-14
  Data pillar categorization requirements before access controls are applied.
enabled: false
tags:
  - M-26-14
  - Compliance
  - Data Classification
  - Data Pillar
  - Manual

# ---------------------------------------------------------------------------
# CONSTANTS — update before enabling
# ---------------------------------------------------------------------------
consts:
  unclassified_index: YOUR-INDEX-OR-DATA-STREAM-NAME
  classification_index: m_26_14-data-classification-requests
  notification_connector_id: YOUR-SLACK-OR-EMAIL-CONNECTOR-ID
  data_steward: data-steward
  submitting_team: security-operations

# ---------------------------------------------------------------------------
# TRIGGERS — manual only, run when new unclassified data stream discovered
# ---------------------------------------------------------------------------
triggers:
  - type: manual

# ---------------------------------------------------------------------------
# STEPS
# ---------------------------------------------------------------------------
steps:

  # -------------------------------------------------------------------------
  # STEP 1: open_classification_case
  # -------------------------------------------------------------------------
  # Opens a Kibana Case assigned to the data steward. The case description
  # provides classification guidance and the M-26-14 sensitivity tier matrix.
  # -------------------------------------------------------------------------
  - name: open_classification_case
    type: cases.createCase
    with:
      title: "M-26-14 Data Classification Required: {{ consts.unclassified_index }}"
      description: |
        ## M-26-14 Data Classification Review

        A new index or data stream has been discovered without an assigned
        data classification label. Classification must be completed before
        retention policies, access controls, and encryption requirements
        can be applied per M-26-14 Data pillar requirements.

        | Field | Value |
        |-------|-------|
        | **Index / Data Stream** | `{{ consts.unclassified_index }}` |
        | **Submitted By** | {{ consts.submitting_team }} |
        | **Initiated** | {{ execution.startedAt | date: '%Y-%m-%d %H:%M UTC' }} |
        | **Audit Record** | `{{ consts.classification_index }}` |

        ---
        ### Classification Instructions

        Review the index and assign one of the following M-26-14 sensitivity tiers:

        | Tier | Label | Description | Retention | Encryption |
        |------|-------|-------------|-----------|------------|
        | **1** | `public` | Non-sensitive, publicly releasable | Standard | In-transit |
        | **2** | `internal` | Controlled unclassified information (CUI) | Extended | At-rest + in-transit |
        | **3** | `sensitive` | High-value asset (HVA) or mission-critical data | Enhanced | FIPS 140-2 |
        | **4** | `restricted` | PII, PHI, or classified-adjacent data | Maximum | FIPS 140-2 + key management |

        ---
        ### Steps to Complete Classification

        1. Inspect the index mappings and sample documents:
           ```
           GET /{{ consts.unclassified_index }}/_mapping
           GET /{{ consts.unclassified_index }}/_search?size=5
           ```

        2. Determine the sensitivity tier based on data content and source.

        3. Apply the classification label to the audit index:
           ```json
           POST /{{ consts.classification_index }}/_doc
           {
             "@timestamp": "<now-iso>",
             "index_name": "{{ consts.unclassified_index }}",
             "state": "classified",
             "sensitivity_tier": "<1|2|3|4>",
             "sensitivity_label": "<public|internal|sensitive|restricted>",
             "classified_by": "<your-username>",
             "classified_at": "<now-iso>",
             "ilm_policy_to_apply": "<recommended-ilm-policy>",
             "notes": "<justification>"
           }
           ```

        4. Apply the appropriate ILM policy and access controls to the index.

        5. Close this case with the assigned classification tier.

        ---
        ### M-26-14 Data Pillar Requirement

        M-26-14 Section 4 — Data pillar: agencies must categorize data and
        limit access based on that categorization. Unclassified data streams
        must not be accessible to broad user roles or subject to default
        retention policies until a sensitivity determination is made.

        ---
        *Auto-generated by M-26-14 Data Classification Intake workflow.*
      owner: securitySolution
      settings:
        syncAlerts: false
      severity: medium
      tags:
        - m_26_14
        - data-classification
        - data-pillar
        - compliance

  # -------------------------------------------------------------------------
  # STEP 2: record_classification_pending
  # -------------------------------------------------------------------------
  - name: record_classification_pending
    type: elasticsearch.index
    with:
      index: "{{ consts.classification_index }}"
      id: "{{ consts.unclassified_index }}-pending-{{ execution.id }}"
      document:
        "@timestamp": "{{ execution.startedAt | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
        index_name: "{{ consts.unclassified_index }}"
        state: classification_pending
        created_at: "{{ execution.startedAt | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
        updated_at: "{{ execution.startedAt | date: '%Y-%m-%dT%H:%M:%S.000Z' }}"
        submitted_by: "{{ consts.submitting_team }}"
        data_steward: "{{ consts.data_steward }}"
        workflow_execution_id: "{{ execution.id }}"
    on-failure:
      continue: true

  # -------------------------------------------------------------------------
  # STEP 3: notify_data_steward
  # -------------------------------------------------------------------------
  - name: notify_data_steward
    type: kibana.request
    with:
      method: POST
      path: /api/actions/connector/{{ consts.notification_connector_id }}/_execute
      body:
        params:
          message: |
            [M-26-14] Data Classification Review Required
            Index: {{ consts.unclassified_index }}
            Submitted by: {{ consts.submitting_team }}
            A Kibana Case has been opened for your review.
            Complete classification before retention policies and access controls are applied.
    on-failure:
      continue: true

  # -------------------------------------------------------------------------
  # STEP 4: log_completion
  # -------------------------------------------------------------------------
  - name: log_completion
    type: console
    with:
      message: "Data classification intake complete. Index: {{ consts.unclassified_index }}. Case opened. Audit record written to {{ consts.classification_index }}."
